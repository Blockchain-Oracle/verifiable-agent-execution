# verifiable-agent-execution — Nixpacks build for Coolify two-service deploy.
#
# Both services build the same dashboard from this repo; runtime env vars
# per-service decide which 0G chain (Galileo testnet vs Aristotle mainnet)
# is rendered. The dashboard's apps/dashboard/src/lib/env.ts reads
# CHAIN_ID + addresses from process.env at request time (Next 14 dynamic
# rendering), so a single build artifact serves either chain depending
# on which Coolify service runs it.
#
# Coolify per-service setup:
#   testnet  →  Domain = verifiable.0g.ai  (or your testnet domain)
#               Env: NONE — env.ts defaults render Galileo
#               Optional: TESTNET_SITE_URL=<self> + MAINNET_SITE_URL=<sibling>
#
#   mainnet  →  Domain = mainnet.verifiable.0g.ai  (subdomain of above)
#               Env required (after Phase 2 mainnet deploy):
#                 ZG_TESTNET_RPC=https://evmrpc.0g.ai
#                 ZG_INDEXER_RPC=<mainnet indexer URL — see docs.0g.ai>
#                 AGENTICID_ADDRESS=<from deployments/0g-mainnet/AgenticID.json>
#                 TEE_VERIFIER_ADDRESS=<from deployments/0g-mainnet/MockTEEVerifier.json>
#                 CHAIN_ID=16661
#               Optional: MAINNET_SITE_URL=<self> + TESTNET_SITE_URL=<sibling>
#
# IMPORTANT: in Coolify set "Base Directory" to / (repo root), NOT
# apps/dashboard.  Nixpacks needs to see the workspace root so pnpm
# resolves the symlinked workspace deps (chain-client, logger,
# tee-adapter) that the dashboard imports.
#
# Reference patterns audited 2026-05-10:
#   /Users/abu/dev/hackathon/kiteai/kite-agent-firewall/nixpacks.toml
#     (single deployable + workspace deps — same shape we use here)
#   /Users/abu/dev/hackathon/kwala/nixpacks.toml
#     (multi-target via APP_NAME — useful when adding @verifiable-agent-
#      execution/docs as a second deployable later)

# ── Install phase ────────────────────────────────────────────────
# `onlyIncludeFiles` keeps the install layer cached: nixpacks rebuilds
# this layer only when a manifest or lockfile changes — not on every
# source edit. List every workspace member's `package.json` so pnpm's
# workspace resolution sees them.
[phases.install]
cmds = ["NODE_ENV=development pnpm install --frozen-lockfile"]
cacheDirectories = [".pnpm-store"]
onlyIncludeFiles = [
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "apps/dashboard/package.json",
  "packages/chain-client/package.json",
  "packages/logger/package.json",
  "packages/tee-adapter/package.json",
  "contracts/package.json",
  "openclaw-skills/verifiable-execution/package.json"
]

# ── Build phase ──────────────────────────────────────────────────
# Workspace deps (chain-client, logger, tee-adapter) ship raw TypeScript
# and are transpiled by Next.js at build time via
# apps/dashboard/next.config.mjs `transpilePackages` — no separate
# pre-build step needed (unlike kite-firewall where firewall-sdk has
# its own dist build).
[phases.build]
dependsOn = ["install"]
cmds = ["pnpm --filter @verifiable-agent-execution/dashboard build"]

# ── Start ────────────────────────────────────────────────────────
# `next start` respects $PORT. Coolify injects it; Next falls back to
# 3000 locally.
[start]
cmd = "pnpm --filter @verifiable-agent-execution/dashboard start"
