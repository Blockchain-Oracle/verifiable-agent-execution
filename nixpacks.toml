# verifiable-agent-execution — Nixpacks build for Coolify multi-service deploy.
#
# THREE deployable services share this one config. APP_NAME picks which
# workspace builds and runs per Coolify service:
#
#   dashboard testnet → APP_NAME unset (defaults to dashboard)
#                       Domain = agentscan.online
#                       Env: NONE — env.ts defaults render Galileo
#                       Optional: TESTNET_SITE_URL=<self> + MAINNET_SITE_URL=<sibling>
#
#   dashboard mainnet → APP_NAME=@verifiable-agent-execution/dashboard (or unset)
#                       Domain = mainnet.agentscan.online
#                       Mainnet contracts are LIVE (deployed 2026-05-11). Env block:
#                         ZG_RPC=https://evmrpc.0g.ai
#                         ZG_INDEXER_RPC=https://indexer-storage-turbo.0g.ai
#                         AGENTICID_ADDRESS=0xC6f7fB1511a7483C6e14258c70529e37ec698937
#                         TEE_VERIFIER_ADDRESS=0x4fffB58B488bBeD9f072Ad68EeB77F643b8858D2
#                         CHAIN_ID=16661
#                       Optional: MAINNET_SITE_URL=<self> + TESTNET_SITE_URL=<sibling>
#                       Note: ZG_TESTNET_RPC is accepted as a back-compat alias
#                       for ZG_RPC; new setups should use ZG_RPC.
#
#   docs              → APP_NAME=@verifiable-agent-execution/docs
#                       Domain = docs.agentscan.online
#                       Nextra v4 site, content-only — no env vars needed.
#                       Listens on $PORT.
#
# IMPORTANT: in Coolify set "Base Directory" to / (repo root) for ALL
# THREE services. Nixpacks needs to see the workspace root so pnpm
# resolves the symlinked workspace deps. APP_NAME (passed via env)
# picks which workspace builds.
#
# Reference patterns audited 2026-05-10..15:
#   /Users/abu/dev/hackathon/kiteai/kite-agent-firewall/nixpacks.toml
#     (single deployable + workspace deps)
#   /Users/abu/dev/hackathon/kwala/nixpacks.toml
#     (multi-target via APP_NAME — the pattern we adopt here)

# ── Install phase ────────────────────────────────────────────────
# `onlyIncludeFiles` keeps the install layer cached: nixpacks rebuilds
# this layer only when a manifest or lockfile changes — not on every
# source edit. List every workspace member's `package.json` so pnpm's
# workspace resolution sees them. (apps/docs is the Nextra v4 docs
# site at docs.agentscan.online; it ships its own Next 15 + React 19
# dep tree, hoisted independently by pnpm.)
[phases.install]
cmds = ["NODE_ENV=development pnpm install --frozen-lockfile"]
cacheDirectories = [".pnpm-store"]
onlyIncludeFiles = [
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "apps/dashboard/package.json",
  "apps/docs/package.json",
  "packages/chain-client/package.json",
  "packages/logger/package.json",
  "packages/tee-adapter/package.json",
  "contracts/package.json",
  "plugin/package.json"
]

# ── Build phase ──────────────────────────────────────────────────
# `${APP_NAME:-@verifiable-agent-execution/dashboard}` picks the
# workspace to build. Default = dashboard (so existing Coolify
# services that don't set APP_NAME keep working unchanged). Set
# APP_NAME=@verifiable-agent-execution/docs on the docs service to
# build the Nextra site instead.
#
# Dashboard workspace deps (chain-client, logger, tee-adapter) ship
# raw TypeScript and are transpiled by Next.js at build time via
# apps/dashboard/next.config.mjs `transpilePackages` — no separate
# pre-build step needed. Docs has no workspace deps.
[phases.build]
dependsOn = ["install"]
cmds = ["pnpm --filter ${APP_NAME:-@verifiable-agent-execution/dashboard} build"]

# ── Start ────────────────────────────────────────────────────────
# `next start` respects $PORT. Coolify injects it; Next falls back to
# 3000 locally. Same APP_NAME-driven dispatch as the build phase.
[start]
cmd = "pnpm --filter ${APP_NAME:-@verifiable-agent-execution/dashboard} start"
